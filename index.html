<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trip Registration</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <h1 >Trip Registration</h1 >

    <div id="registration-form">
        <h2 >Register a New Trip</h2 >
        <form id="trip-form">
            <label for="trip-name">Trip Name:</label>
            <input type="text" id="trip-name" name="trip-name" required><br><br>

            <label for="trip-destination">Destination:</label>
            <input type="text" id="trip-destination" name="trip-destination" required><br><br>

            <label for="trip-start-date">Start Date:</label>
            <input type="date" id="trip-start-date" name="trip-start-date"><br><br>

            <label for="trip-end-date">End Date:</label>
            <input type="date" id="trip-end-date" name="trip-end-date"><br><br>

            <label for="trip-notes">Notes:</label>
            <textarea id="trip-notes" name="trip-notes"></textarea><br><br>

            <button type="submit">Register Trip</button>
        </form>
    </div >

    <div id="trip-list">
        <h2 >Registered Trips</h2 >
        <ul id="trip-items"></ul >
    </div >

    <div id="ai-chat-panel">
        <h2 >AI Trip Assistant</h2 >
        <div id="chat-log"></div >
        <input type="text" id="user-input" placeholder="Type your message...">
        <button id="send-button">Send</button>
    </div >

    <script src="main.js"></script>
</body >
</html >
