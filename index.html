<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trip Registration</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <h1>Trip Registration</h1>

    <div id="trip-list">
        <h2>Registered Trips</h2>
        <ul id="trip-items">
            <!-- Trip items will be dynamically added here by JavaScript -->
        </ul>
    </div>

    <div id="new-trip-form">
        <h2>New Trip</h2>
        <form id="trip-form">
            <label for="name">Name:</label>
            <input type="text" id="name" name="name" required>

            <label for="destination">Destination:</label>
            <input type="text" id="destination" name="destination" required>

            <label for="start-date">Start Date:</label>
            <input type="date" id="start-date" name="start-date">

            <label for="end-date">End Date:</label>
            <input type="date" id="end-date" name="end-date">

            <label for="notes">Notes:</label>
            <textarea id="notes" name="notes"></textarea>

            <button type="submit">Add Trip</button>
        </form>
    </div>

    <div id="intelligence-chat">
      <h2>Intelligence Briefing</h2>
      <select id="trip-select" onchange="fetchIntelligence()">
        <!-- Options will be dynamically added by JavaScript -->
      </select>
      <div id="briefing-content"></div>
    </div>

    <script src="main.js"></script>
</body>
</html>
