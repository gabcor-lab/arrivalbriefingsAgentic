<html>
<head>
	<title>Trip Registration and Briefing</title>
	<link rel="stylesheet" href="style.css">
</head>
<body>
	<h1>Trip Registration</h1>
	
	<form id="trip-form">
		<label for="trip-name">Trip Name:</label><br>
		<input type="text" id="trip-name" name="trip-name"><br>

		<label for="trip-destination">Destination:</label><br>
		<input type="text" id="trip-destination" name="trip-destination"><br>

		<label for="trip-start-date">Start Date:</label><br>
		<input type="date" id="trip-start-date" name="trip-start-date"><br>

		<label for="trip-end-date">End Date:</label><br>
		<input type="date" id="trip-end-date" name="trip-end-date"><br>

		<label for="trip-notes">Notes:</label><br>
		<textarea id="trip-notes" name="trip-notes"></textarea><br>

		<button type="submit">Register Trip</button>
	</form>

	<h2>Registered Trips</h2>
	<ul id="trip-list">
	</ul>

	<h2>AI Briefing</h2>
	<div id="briefing-container">
		<textarea id="briefing-display"></textarea><br>
		<input type="text" id="briefing-prompt" placeholder="Enter briefing prompt..."><br>
		<button id="get-briefing">Get Briefing</button>
	</div>

	<script src="main.js"></script>
</body>
</html>
