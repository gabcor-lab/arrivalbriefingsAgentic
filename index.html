<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trip Management</title>
</head>
<body>
    <h1">Trip Management</h1>

    <h2">Trip List</h2>
    <ul id="trip-list">
        <!-- Trip list items will be dynamically added here -->
    </ul>

    <h2">Add New Trip</h2>
    <form id="new-trip-form">
        <label for="trip-name">Name:</label><br>
        <input type="text" id="trip-name" name="name" required><br><br>

        <label for="trip-destination">Destination:</label><br>
        <input type="text" id="trip-destination" name="destination" required><br><br>

        <label for="trip-start-date">Start Date:</label><br>
        <input type="date" id="trip-start-date" name="start_date"><br><br>

        <label for="trip-end-date">End Date:</label><br>
        <input type="date" id="trip-end-date" name="end_date"><br><br>

        <label for="trip-notes">Notes:</label><br>
        <textarea id="trip-notes" name="notes"></textarea><br><br>

        <button type="submit">Add Trip</button>
    </form>

    <h2">Intelligence Gathering</h2>
    <label for="trip-id">Trip ID:</label>
    <input type="number" id="trip-id">
    <button onclick="gatherIntelligence(document.getElementById('trip-id').value)">Gather Intelligence</button>
    <div id="intelligence-output"></div>

    <script src="main.js"></script>
</body>
</html>
