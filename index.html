<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Trip Management</title>
    <style>
        body {
            font-family: Arial, sans-serif;
        }
        table {
            border-collapse: collapse;
            width: 80%;
            margin: 20px auto;
        }
        th, td {
            border: 1px solid #ddd;
            padding: 8px;
            text-align: left;
        }
        th {
            background-color: #f2f2f2;
        }
        button {
            padding: 5px 10px;
            background-color: #4CAF50;
            color: white;
            border: none;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <h1>Trip Management</h1>

    <table>
        <thead>
            <tr>
                <th>ID</th>
                <th>Name</th>
                <th>Destination</th>
                <th>Start Date</th>
                <th>End Date</th>
                <th>Notes</th>
                <th>Actions</th>
            </tr>
        </thead>
        <tbody id="trip-list"></tbody>
    </table>

    <button id="new-trip">New Trip</button>

    <script>
        async function fetchTrips() {
            const response = await fetch('/' );
            const trips = await response.json();

            const tripList = document.getElementById('trip-list');
            tripList.innerHTML = '';

            trips.forEach(trip => {
                const row = document.createElement('tr');
                row.innerHTML = `
                    <td>${trip.id}</td>
                    <td>${trip.name}</td>
                    <td>${trip.destination}</td>
                    <td>${trip.start_date}</td>
                    <td>${trip.end_date}</td>
                    <td>${trip.notes}</td>
                    <td>
                        <button onclick="editTrip(${trip.id})">Edit</button>
                        <button onclick="deleteTrip(${trip.id})">Delete</button>
                        <a href="/html_briefing/${trip.id}">Briefing</a>
                    </td>
                `;
                tripList.appendChild(row);
            });
        }

        async function newTrip() {
            // Implement new trip creation logic here (e.g., open a form)
            alert('New trip functionality not implemented yet.');
        }

        async function editTrip(tripId) {
            // Implement edit trip functionality here (e.g., open an edit form)
            alert(`Edit trip ${tripId} functionality not implemented yet.`);
        }

        async function deleteTrip(tripId) {
            const confirmDelete = confirm("Are you sure you want to delete this trip?");
            if (confirmDelete) {
                try {
                   await fetch(`/" + ${tripId} + "`, { method: 'DELETE' } );
                    fetchTrips();
                } catch (error) {
                    alert("Error deleting trip.");
                }
            }
        }

        document.getElementById('new-trip').addEventListener('click', newTrip);
        fetchTrips();
    </script>

</body>
</html>
