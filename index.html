<!DOCTYPE html>
<html>
<head>
    <title>Trip Registration</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <h1>Trip Registration</h1>

    <form id="tripForm">
        <label for="tripName">Trip Name:</label><br>
        <input type="text" id="tripName" name="tripName"><br><br>

        <label for="tripDestination">Destination:</label><br>
        <input type="text" id="tripDestination" name="tripDestination"><br><br>

        <label for="tripStartDate">Start Date:</label><br>
        <input type="date" id="tripStartDate" name="tripStartDate"><br><br>

        <label for="tripEndDate">End Date:</label><br>
        <input type="date" id="tripEndDate" name="tripEndDate"><br><br>

        <label for="tripNotes">Notes:</label><br>
        <textarea id="tripNotes" name="tripNotes"></textarea><br><br>

        <button type="submit">Register Trip</button>
    </form>

    <h2>Registered Trips</h2>
    <ul id="tripList"></ul>

    <button id="generateIntelligenceButton">Generate Intelligence</button>

    <div id="chatInterface">
        <h3>Chat Interface</h3>
        <div id="chatLog"></div>
        <input type="text" id="chatInput" placeholder="Type your message..."><button id="sendButton">Send</button>
    </div>

    <script src="main.js"></script>
</body>
</html>
